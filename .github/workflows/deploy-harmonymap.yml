name: Deploy HarmonyMap to Cloudflare Pages

on:
  push:
    branches:
      - main
      - claude/simplify-navigation-ui-Ty8ve
    paths:
      - 'harmonymap/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: harmonymap
        run: npm install

      - name: Build
        working-directory: harmonymap
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: harmonymap
        run: npx wrangler pages deploy dist --project-name harmonymap --branch ${{ github.ref_name == 'main' && 'main' || 'claude/simplify-navigation-ui-Ty8ve' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
