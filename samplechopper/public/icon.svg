  <rect x="252" y="400" width="16" height="52" rx="4" fill="#ff6b35" opacity="0.7"/>
  <rect x="278" y="376" width="16" height="76" rx="4" fill="#ff6b35" opacity="0.7"/>
  <rect x="304" y="404" width="16" height="48" rx="4" fill="#ff6b35" opacity="0.7"/>
